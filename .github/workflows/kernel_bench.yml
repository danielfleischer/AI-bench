name: KernelBench Perf

on:
  workflow_dispatch:
    inputs:
      RUN_MODE:
        description: "Run mode"
        type: choice
        default: 'bench'
        options:
          - bench
          - ci
      DEVICE_CPU:
        description: "Device: CPU"
        type: boolean
        default: false
      DEVICE_XPU:
        description: "Device: Intel GPU"
        type: boolean
        default: true
      DEVICE_CUDA:
        description: "Device: Nvidia GPU"
        type: boolean
        default: false
      BACKEND_PYTORCH:
        description: "Backend: PyTorch (eager)"
        type: boolean
        default: true
      BACKEND_PYTORCH_COMPILE:
        description: "Backend: PyTorch (compile)"
        type: boolean
        default: false
      BACKEND_TRITON:
        description: "Backend: Triton"
        type: boolean
        default: false
      BACKEND_HELION:
        description: "Backend: Helion"
        type: boolean
        default: false
      BACKEND_MLIR:
        description: "Backend: MLIR"
        type: boolean
        default: false

env:
  NPROCS_LIMIT_LINK: 8
  SRUN: ${HOME}/srun.sh

jobs:
  CPU-PyTorch:
    runs-on: pcl-tiergarten
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.DEVICE_CPU && inputs.BACKEND_PYTORCH)

    steps:
      - uses: actions/checkout@v5

      - name: Intel Emerald Rapids
        run: "${{ env.SRUN }} --partition=emr --time=0:15:00 --constraint=\"notrb\" -- \
            '${{ github.workspace }}/infra/scripts/ci-cpu-run-kernel-bench.sh -m ${{ inputs.RUN_MODE }} -b torch'"

  CPU-MLIR:
    runs-on: pcl-tiergarten
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.DEVICE_CPU && inputs.BACKEND_MLIR)

    steps:
      - uses: actions/checkout@v5

      - name: Intel Emerald Rapids
        run: "${{ env.SRUN }} --partition=emr --time=0:15:00 --constraint=\"notrb\" -- \
            '${{ github.workspace }}/infra/scripts/ci-cpu-run-kernel-bench.sh -m ${{ inputs.RUN_MODE }} -b mlir'"

  XPU-PyTorch:
    runs-on: pcl-tiergarten
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.DEVICE_XPU && inputs.BACKEND_PYTORCH)

    steps:
      - uses: actions/checkout@v5

      - name: Intel Arc B580
        run: "${{ env.SRUN }} --partition=b580 --time=0:15:00 -- \
            '${{ github.workspace }}/infra/scripts/ci-xpu-run-kernel-bench.sh -m ${{ inputs.RUN_MODE }} -b torch'"

  XPU-PyTorch-Compile:
    runs-on: pcl-tiergarten
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.DEVICE_XPU && inputs.BACKEND_PYTORCH_COMPILE)

    steps:
      - uses: actions/checkout@v5

      - name: Intel Arc B580
        run: "${{ env.SRUN }} --partition=b580 --time=0:15:00 -- \
            '${{ github.workspace }}/infra/scripts/ci-xpu-run-kernel-bench.sh -m ${{ inputs.RUN_MODE }} -b torch-compile'"

  XPU-Triton:
    runs-on: pcl-tiergarten
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.DEVICE_XPU && inputs.BACKEND_TRITON)

    steps:
      - uses: actions/checkout@v5

      - name: Intel Arc B580
        run: "${{ env.SRUN }} --partition=b580 --time=0:15:00 -- \
            '${{ github.workspace }}/infra/scripts/ci-xpu-run-kernel-bench.sh -m ${{ inputs.RUN_MODE }} -b triton'"

  XPU-Helion:
    runs-on: pcl-tiergarten
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.DEVICE_XPU && inputs.BACKEND_HELION)

    steps:
      - uses: actions/checkout@v5

      - name: Intel Arc B580
        run: "${{ env.SRUN }} --partition=b580 --time=0:15:00 -- \
            '${{ github.workspace }}/infra/scripts/ci-xpu-run-kernel-bench.sh -m ${{ inputs.RUN_MODE }} -b helion'"

  CUDA-PyTorch:
    runs-on: pcl-tiergarten
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.DEVICE_CUDA && inputs.BACKEND_PYTORCH)

    steps:
      - uses: actions/checkout@v5

      - name: Nvidia A100
        run: "${{ env.SRUN }} --partition=a100 --time=0:15:00 -- \
            '${{ github.workspace }}/infra/scripts/ci-cuda-run-kernel-bench.sh -m ${{ inputs.RUN_MODE }} -b torch'"

  CUDA-Triton:
    runs-on: pcl-tiergarten
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.DEVICE_CUDA && inputs.BACKEND_TRITON)

    steps:
      - uses: actions/checkout@v5

      - name: Nvidia A100
        run: "${{ env.SRUN }} --partition=a100 --time=0:15:00 -- \
            '${{ github.workspace }}/infra/scripts/ci-cuda-run-kernel-bench.sh -m ${{ inputs.RUN_MODE }} -b triton'"

  CUDA-Helion:
    runs-on: pcl-tiergarten
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.DEVICE_CUDA && inputs.BACKEND_HELION)

    steps:
      - uses: actions/checkout@v5

      - name: Nvidia A100
        run: "${{ env.SRUN }} --partition=a100 --time=0:15:00 -- \
            '${{ github.workspace }}/infra/scripts/ci-cuda-run-kernel-bench.sh -m ${{ inputs.RUN_MODE }} -b helion'"
