inputs:
  X:
    shape: [SEQUENCE_LENGTH, BATCH_SIZE, INPUT_SIZE]
    dtype: inherit
  H0:
    shape: [BATCH_SIZE, HIDDEN_SIZE]
    dtype: inherit

inits:
  - dim: INPUT_SIZE
  - dim: HIDDEN_SIZE
  - dim: OUTPUT_SIZE

ci:
  - params: [X, H0]
    dtype: float16
    dims:
      BATCH_SIZE: 1
      INPUT_SIZE: 64
      HIDDEN_SIZE: 16
      OUTPUT_SIZE: 8
      SEQUENCE_LENGTH: 16
