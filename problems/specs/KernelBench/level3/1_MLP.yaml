inputs:
  X:
    shape: [BATCH, IN_SIZE]
    dtype: inherit

inits:
  - dim: IN_SIZE
  - dim: LAYER_SIZES
  - dim: OUT_SIZE

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH: 4
      IN_SIZE: 32
      LAYER_SIZES: [32, 32]
      OUT_SIZE: 16

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 128
      IN_SIZE: 4096
      LAYER_SIZES: [4096, 4096]
      OUT_SIZE: 2048
    rtol: 9.8e-04
    atol: 2.2e-04
