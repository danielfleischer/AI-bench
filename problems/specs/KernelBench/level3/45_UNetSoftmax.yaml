inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: FEATURES

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 1
      IN_CHANNELS: 8
      OUT_CHANNELS: 4
      HEIGHT: 32
      WIDTH: 64
      FEATURES: 32
