inputs:
  X:
    shape: [SEQUENCE_LENGTH, BATCH_SIZE, INPUT_SIZE]
    dtype: inherit
  H0:
    shape: [NUM_LAYERS_BIDIRECTIONAL, BATCH_SIZE, HIDDEN_SIZE]
    dtype: inherit

inits:
  - dim: INPUT_SIZE
  - dim: HIDDEN_SIZE
  - dim: NUM_LAYERS

ci:
  - params: [X, H0]
    dtype: float32
    dims:
      BATCH_SIZE: 1
      SEQUENCE_LENGTH: 32
      INPUT_SIZE: 8
      HIDDEN_SIZE: 16
      NUM_LAYERS: 3
      NUM_LAYERS_BIDIRECTIONAL: 6
