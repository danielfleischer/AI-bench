inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, IMAGE_SIZE, IMAGE_SIZE]
    dtype: inherit

inits:
  - dim: NUM_CLASSES
  - dim: EMBED_DIM
  - dim: NUM_HEADS

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 1
      IN_CHANNELS: 3
      IMAGE_SIZE: 32
      NUM_CLASSES: 2
      EMBED_DIM: 64
      NUM_HEADS: 2
