inputs:
  X:
    shape: [BATCH, SEQ_LEN, N_EMBD]
    dtype: inherit

inits:
  - dim: N_EMBD
  - dim: N_HEAD
  - dim: ATTN_PDROP
  - dim: RESID_PDROP
  - dim: MAX_SEQLEN

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH: 2
      MAX_SEQLEN: 128
      SEQ_LEN: 64
      N_EMBD: 48
      N_HEAD: 2
      ATTN_PDROP: 0.0
      RESID_PDROP: 0.0

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 128
      MAX_SEQLEN: 1024
      SEQ_LEN: 512
      N_EMBD: 768
      N_HEAD: 8
      ATTN_PDROP: 0.0
      RESID_PDROP: 0.0
    rtol: 7.6e-04
    atol: 3.8e-04
