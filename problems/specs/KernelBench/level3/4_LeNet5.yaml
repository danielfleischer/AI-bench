inputs:
  X:
    shape: [BATCH, IN_1, IN_2, IN_3]
    dtype: inherit

inits:
  - dim: NUM_CLASSES

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH: 2
      IN_1: 1
      IN_2: 32
      IN_3: 32
      NUM_CLASSES: 5

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 4096
      IN_1: 1
      IN_2: 32
      IN_3: 32
      NUM_CLASSES: 20
    rtol: 9.8e-04
    atol: 5.7e-05
