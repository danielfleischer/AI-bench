inputs:
  X:
    shape: [BATCH_SIZE, NUM_INPUT_FEATURES, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: NUM_INPUT_FEATURES
  - dim: NUM_OUTPUT_FEATURES

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 1
      NUM_INPUT_FEATURES: 4
      NUM_OUTPUT_FEATURES: 8
      HEIGHT: 32
      WIDTH: 32
