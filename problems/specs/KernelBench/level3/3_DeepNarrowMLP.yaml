inputs:
  X:
    shape: [BATCH, IN_SIZE]
    dtype: inherit

inits:
  - dim: IN_SIZE
  - dim: LAYER_SIZES
  - dim: OUT_SIZE

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH: 8
      IN_SIZE: 64
      LAYER_SIZES: [
        8, 8, 8, 8,
        8, 8, 8, 8,
        8, 8, 8, 8,
        8, 8, 8, 8
      ]
      OUT_SIZE: 64

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 1024
      IN_SIZE: 4096
      LAYER_SIZES: [
        1024, 1024, 1024, 1024,
        1024, 1024, 1024, 1024,
        1024, 1024, 1024, 1024,
        1024, 1024, 1024, 1024
      ]
      OUT_SIZE: 4096
