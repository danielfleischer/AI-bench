inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, WIDTH, HEIGHT]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE

ci:
  - params: [x]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 2
      OUT_CHANNELS: 4
      KERNEL_SIZE: [3, 5, 5]
      DEPTH: 32
      WIDTH: 32
      HEIGHT: 32
