inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, HEIGHT, WIDTH, DEPTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE

ci:
  - params: [x]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 3
      OUT_CHANNELS: 16
      KERNEL_SIZE: 3
      HEIGHT: 32
      WIDTH: 32
      DEPTH: 5
