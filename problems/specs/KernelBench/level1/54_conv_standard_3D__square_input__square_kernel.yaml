inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, WIDTH, HEIGHT]
    dtype: float16

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE

ci:
  - params: [x]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 3
      OUT_CHANNELS: 16
      KERNEL_SIZE: 3
      DEPTH: 16
      WIDTH: 16
      HEIGHT: 16
