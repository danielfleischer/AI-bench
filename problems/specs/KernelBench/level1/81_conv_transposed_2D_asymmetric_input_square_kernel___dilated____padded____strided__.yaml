inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, HEIGHT_IN, WIDTH_IN]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: PADDING
  - dim: DILATION

ci:
  - params: [x]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      KERNEL_SIZE: 3
      STRIDE: 5
      PADDING: 1
      DILATION: 2
      HEIGHT_IN: 16
      WIDTH_IN: 32
