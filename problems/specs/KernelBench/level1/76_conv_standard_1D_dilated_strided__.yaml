inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, LENGTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: DILATION

ci:
  - params: [x]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      KERNEL_SIZE: 3
      STRIDE: 3
      DILATION: 4
      LENGTH: 128
