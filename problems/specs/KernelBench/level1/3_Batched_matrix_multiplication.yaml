inputs:
  A:
    shape: [BATCH, M, K]
    dtype: inherit
  B:
    shape: [BATCH, K, N]
    dtype: inherit

ci:
  - params: [A, B]
    dtype: float32
    dims:
      BATCH: 2
      M: 64
      N: 128
      K: 128

bench-gpu:
  - params: [A, B]
    dtype: float16
    dims:
      BATCH: 128
      M: 512
      N: 1024
      K: 2048
    flop: "2*BATCH*M*N*K"
    rtol: 1.0e-03
    atol: 1.0e-05
