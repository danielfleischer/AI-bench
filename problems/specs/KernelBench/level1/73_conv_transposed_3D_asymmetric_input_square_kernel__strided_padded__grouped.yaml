inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: PADDING
  - dim: GROUPS

ci:
  - params: [x]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 4
      KERNEL_SIZE: 3
      STRIDE: 2
      PADDING: 1
      GROUPS: 4
      DEPTH: 8
      HEIGHT: 16
      WIDTH: 32
