inputs:
  anchor:
    shape: [BATCH_SIZE, INPUT_DIM]
    dtype: inherit
    inits: [scale]
  positive:
    shape: [BATCH_SIZE, INPUT_DIM]
    dtype: inherit
  negative:
    shape: [BATCH_SIZE, INPUT_DIM]
    dtype: inherit

inits:
  - dim: MARGIN

ci:
  - params: [anchor, positive, negative]
    dtype: float32
    dims:
      BATCH_SIZE: 64
      INPUT_DIM: 8
      MARGIN: 1.0
