inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: PADDING

ci:
  - params: [x]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 16
      KERNEL_SIZE: 3
      STRIDE: 1
      PADDING: 0
      HEIGHT: 32
      WIDTH: 32
