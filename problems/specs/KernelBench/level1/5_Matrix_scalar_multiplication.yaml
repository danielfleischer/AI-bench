inputs:
  A:
    shape: [M, N]
    dtype: inherit
  B:
    shape: [UNIT]
    dtype: inherit

ci:
  - params: [A, B]
    dtype: float32
    dims:
      M: 64
      N: 32
      UNIT: 1
    flop: "M*N"

bench-gpu:
  - params: [A, B]
    dtype: float16
    dims:
      M: 16384
      N: 4096
      UNIT: 1
    flop: "M*N"
