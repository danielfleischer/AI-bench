inputs:
  A:
    shape: [K, M]
    dtype: inherit
  B:
    shape: [K, N]
    dtype: inherit

ci:
  - params: [A, B]
    dtype: float32
    dims:
      M: 64
      N: 128
      K: 256
    flop: "2*M*N*K"

bench-gpu:
  - params: [A, B]
    dtype: float16
    dims:
      M: 1024
      N: 2048
      K: 4096
    flop: "2*M*N*K"
    rtol: 1.0e-03
    atol: 1.0e-05
