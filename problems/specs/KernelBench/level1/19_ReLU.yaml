inputs:
  X:
    shape: [BATCH, DIM]
    dtype: inherit

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH: 128
      DIM: 512

bench-cpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 128
      DIM: 2048
    flop: "BATCH*DIM"
    mem_bytes: "(2*BATCH*DIM) * 2" # f16

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 1024
      DIM: 16384
    flop: "BATCH*DIM"
    mem_bytes: "(2*BATCH*DIM) * 2" # f16
