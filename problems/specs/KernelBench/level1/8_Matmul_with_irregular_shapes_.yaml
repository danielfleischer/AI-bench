inputs:
  A:
    shape: [M, K]
    dtype: inherit
  B:
    shape: [K, N]
    dtype: inherit

ci:
  - params: [A, B]
    dtype: float32
    dims:
      M: 60
      N: 37
      K: 19
    flop: "2*M*N*K"

bench-gpu:
  - params: [A, B]
    dtype: float16
    dims:
      M: 8205
      N: 5921
      K: 2949
    flop: "2*M*N*K"
    rtol: 1.0e-03
    atol: 1.0e-05
