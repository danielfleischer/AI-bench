inputs:
  A:
    shape: [M, K]
    dtype: inherit
  B:
    shape: [K, N]
    dtype: inherit

ci:
  - params: [A, B]
    dtype: float32
    dims:
      M: 8
      N: 16
      K: 512
    flop: "2*M*N*K"

bench-gpu:
  - params: [A, B]
    dtype: float16
    dims:
      M: 256
      N: 256
      K: 16384
    flop: "2*M*N*K"
