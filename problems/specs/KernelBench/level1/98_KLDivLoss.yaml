inputs:
  predictions:
    shape: [BATCH_SIZE, INPUT_DIM]
    dtype: float16
    inits: [scale, softmax]
  targets:
    shape: [BATCH_SIZE, INPUT_DIM]
    dtype: float16
    inits: [softmax]

inits: []

ci:
  - params: [predictions, targets]
    dtype: float16
    dims:
      BATCH_SIZE: 64
      INPUT_DIM: 64
