inputs:
  A:
    shape: [N, M, K]
    dtype: inherit
  B:
    shape: [K, L]
    dtype: inherit

ci:
  - params: [A, B]
    dtype: float32
    dims:
      N: 4
      M: 32
      K: 64
      L: 24
    flop: "2*N*M*L*K"

bench-gpu:
  - params: [A, B]
    dtype: float16
    dims:
      N: 16
      M: 1024
      K: 2048
      L: 768
    flop: "2*N*M*L*K"
    rtol: 1.0e-03
    atol: 1.0e-05
