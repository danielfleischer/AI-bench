inputs:
  A:
    shape: [M, K]
    dtype: inherit
  B:
    shape: [K, N]
    dtype: inherit

ci:
  - params: [A, B]
    dtype: float16
    dims:
      M: 256
      N: 256
      K: 16
    flop: "2*M*N*K"

bench-gpu:
  - params: [A, B]
    dtype: float16
    dims:
      M: 8192
      N: 8192
      K: 64
    flop: "2*M*N*K"
