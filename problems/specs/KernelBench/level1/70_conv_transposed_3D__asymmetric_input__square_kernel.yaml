inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: float16

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE

ci:
  - params: [x]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 12
      OUT_CHANNELS: 6
      KERNEL_SIZE: 3
      DEPTH: 24
      HEIGHT: 24
      WIDTH: 24
