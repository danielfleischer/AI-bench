inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, LENGTH]
    dtype: float16

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: PADDING
  - dim: DILATION

ci:
  - params: [x]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      KERNEL_SIZE: 5
      STRIDE: 1
      PADDING: 0
      DILATION: 3
      LENGTH: 128
