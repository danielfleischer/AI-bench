inputs:
  x:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE

ci:
  - params: [x]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 24
      OUT_CHANNELS: 24
      KERNEL_SIZE: 3
      DEPTH: 16
      HEIGHT: 16
      WIDTH: 16
