inputs:
  A:
    shape: [M, K]
    dtype: inherit
  B:
    shape: [K, N]
    dtype: inherit

ci:
  - params: [A, B]
    dtype: float16
    dims:
      M: 64
      N: 1
      K: 256
    flop: "2*M*N*K"

bench-gpu:
  - params: [A, B]
    dtype: float16
    dims:
      M: 2048
      N: 1
      K: 16384
    flop: "2*M*N*K"
