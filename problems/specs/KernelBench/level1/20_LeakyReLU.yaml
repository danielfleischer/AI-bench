inputs:
  X:
    shape: [BATCH, DIM]
    dtype: inherit

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH: 128
      DIM: 512
    flop: "2*BATCH*DIM"

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 1024
      DIM: 16384
    flop: "2*BATCH*DIM"
    rtol: 1.0e-03
    atol: 1.0e-05
