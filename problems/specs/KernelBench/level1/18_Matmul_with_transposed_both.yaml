inputs:
  A:
    shape: [K, M]
    dtype: inherit
  B:
    shape: [N, K]
    dtype: inherit

ci:
  - params: [A, B]
    dtype: float16
    dims:
      M: 64
      N: 128
      K: 256
    flop: "2*N*M*K"

bench-gpu:
  - params: [A, B]
    dtype: float16
    dims:
      M: 1024
      N: 2048
      K: 4096
    flop: "2*N*M*K"
