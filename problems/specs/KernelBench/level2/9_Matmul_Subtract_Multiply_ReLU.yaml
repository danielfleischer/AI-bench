inputs:
  X:
    shape: [BATCH, IN_FEAT]
    dtype: float16

inits:
  - dim: IN_FEAT
  - dim: OUT_FEAT
  - dim: SUB_VAL
  - dim: MUL_VAL

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 2
      IN_FEAT: 64
      OUT_FEAT: 64
      SUB_VAL: 2.0
      MUL_VAL: 1.5
    flop: "2*BATCH*IN_FEAT*OUT_FEAT + 2*BATCH*OUT_FEAT"

bench-gpu:
  - params: [X]
    dtype: float16
    dims:
      BATCH: 1024
      IN_FEAT: 4096
      OUT_FEAT: 4096
      SUB_VAL: 2.0
      MUL_VAL: 1.5
    flop: "2*BATCH*IN_FEAT*OUT_FEAT + 2*BATCH*OUT_FEAT"
