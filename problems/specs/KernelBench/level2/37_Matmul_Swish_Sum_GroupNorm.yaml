inputs:
  X:
    shape: [BATCH_SIZE, IN_FEATURES]
    dtype: float16

inits:
  - dim: IN_FEATURES
  - dim: OUT_FEATURES
  - dim: NUM_GROUPS
  - dim: BIAS_SHAPE

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_FEATURES: 8
      OUT_FEATURES: 16
      NUM_GROUPS: 4
      BIAS_SHAPE: [16]
