inputs:
  X:
    shape: [BATCH_SIZE, IN_FEATURES]
    dtype: float16

inits:
  - dim: IN_FEATURES
  - dim: OUT_FEATURES
  - dim: SCALING_FACTOR
  - dim: HARDTANH_MIN
  - dim: HARDTANH_MAX

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_FEATURES: 32
      OUT_FEATURES: 32
      SCALING_FACTOR: 0.5
      HARDTANH_MIN: -2
      HARDTANH_MAX: 2
