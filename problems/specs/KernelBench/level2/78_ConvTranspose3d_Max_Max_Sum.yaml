inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: float16

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: PADDING

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      DEPTH: 16
      HEIGHT: 16
      WIDTH: 16
      KERNEL_SIZE: 5
      STRIDE: 2
      PADDING: 2
