inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: MULTIPLIER_SHAPE
  - dim: CLAMP_MIN
  - dim: CLAMP_MAX

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 3
      OUT_CHANNELS: 8
      DEPTH: 8
      HEIGHT: 16
      WIDTH: 16
      KERNEL_SIZE: 3
      MULTIPLIER_SHAPE: [8, 1, 1, 1] # TODO: bind these to other dims
      CLAMP_MIN: -1.0
      CLAMP_MAX: 1.0
