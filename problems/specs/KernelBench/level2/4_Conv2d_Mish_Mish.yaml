inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      HEIGHT: 16
      WIDTH: 16
      KERNEL_SIZE: 3
