inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: float16

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: PADDING
  - dim: MIN_VALUE
  - dim: DIVISOR

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      DEPTH: 12
      HEIGHT: 24
      WIDTH: 24
      KERNEL_SIZE: 3
      STRIDE: 2
      PADDING: 1
      MIN_VALUE: -1.0
      DIVISOR: 2.0
