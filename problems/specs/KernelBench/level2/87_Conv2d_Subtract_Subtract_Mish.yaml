inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, HEIGHT, WIDTH]
    dtype: float16

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: SUBTRACT_VALUE_1
  - dim: SUBTRACT_VALUE_2

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 16
      HEIGHT: 32
      WIDTH: 32
      KERNEL_SIZE: 3
      SUBTRACT_VALUE_1: 0.5
      SUBTRACT_VALUE_2: 0.2
