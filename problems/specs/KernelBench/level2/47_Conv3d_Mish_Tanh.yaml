inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, D, H, W]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      D: 16
      H: 32
      W: 32
      KERNEL_SIZE: 3
