inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: GROUPS
  - dim: NUM_GROUPS

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 4
      HEIGHT: 32
      WIDTH: 32
      KERNEL_SIZE: 3
      STRIDE: 1
      GROUPS: 4
      NUM_GROUPS: 4
