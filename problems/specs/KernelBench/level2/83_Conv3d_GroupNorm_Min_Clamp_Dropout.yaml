inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: GROUPS
  - dim: MIN_VALUE
  - dim: MAX_VALUE
  - dim: DROPOUT_P

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 3
      OUT_CHANNELS: 8
      DEPTH: 8
      HEIGHT: 32
      WIDTH: 32
      KERNEL_SIZE: 3
      GROUPS: 8
      MIN_VALUE: 0.0
      MAX_VALUE: 1.0
      DROPOUT_P: 0.2
