inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: float16

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: SUM_TENSOR_SHAPE

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 16
      DEPTH: 16
      HEIGHT: 32
      WIDTH: 32
      KERNEL_SIZE: 3
      SUM_TENSOR_SHAPE: [16, 1, 1, 1] # TODO: bind these to other dims
