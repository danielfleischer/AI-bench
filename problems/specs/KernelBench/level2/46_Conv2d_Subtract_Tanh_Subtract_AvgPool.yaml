inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: SUBTRACT1_VALUE
  - dim: SUBTRACT2_VALUE
  - dim: KERNEL_SIZE_POOL

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      HEIGHT: 32
      WIDTH: 32
      KERNEL_SIZE: 3
      SUBTRACT1_VALUE: 0.5
      SUBTRACT2_VALUE: 0.2
      KERNEL_SIZE_POOL: 2
