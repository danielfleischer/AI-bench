inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, D, H, W]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: GROUPS
  - dim: BIAS

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      D: 16
      H: 16
      W: 16
      KERNEL_SIZE: 3
      GROUPS: 4
      BIAS: false
