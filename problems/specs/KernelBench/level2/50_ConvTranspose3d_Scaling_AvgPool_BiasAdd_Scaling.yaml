inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: PADDING
  - dim: SCALE1
  - dim: SCALE2
  - dim: BIAS_SHAPE

ci:
  - params: [X]
    dtype: float32 # "avg_pool3d_out_frame" not implemented for 'Half'
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 3
      OUT_CHANNELS: 8
      DEPTH: 8
      HEIGHT: 16
      WIDTH: 16
      KERNEL_SIZE: 3
      STRIDE: 2
      PADDING: 1
      SCALE1: 0.5
      SCALE2: 1.0
      BIAS_SHAPE: [8, 1, 1, 1] # TODO: bind these to other dims
