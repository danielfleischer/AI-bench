inputs:
  X:
    shape: [BATCH_SIZE, IN_FEATURES]
    dtype: inherit

inits:
  - dim: IN_FEATURES
  - dim: OUT_FEATURES
  - dim: NUM_GROUPS
  - dim: MULTIPLY_WEIGHT_SHAPE

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_FEATURES: 32
      OUT_FEATURES: 32
      NUM_GROUPS: 4
      MULTIPLY_WEIGHT_SHAPE: [32] # TODO: bind these to other dims
