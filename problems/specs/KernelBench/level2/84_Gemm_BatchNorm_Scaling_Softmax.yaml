inputs:
  X:
    shape: [BATCH_SIZE, IN_FEATURES]
    dtype: inherit

inits:
  - dim: IN_FEATURES
  - dim: OUT_FEATURES
  - dim: BN_EPS
  - dim: BN_MOMENTUM
  - dim: SCALE_SHAPE

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_FEATURES: 32
      OUT_FEATURES: 32
      BN_EPS: 0.00001
      BN_MOMENTUM: 0.1
      SCALE_SHAPE: [1]
