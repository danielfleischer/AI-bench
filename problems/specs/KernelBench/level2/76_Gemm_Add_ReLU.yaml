inputs:
  X:
    shape: [BATCH_SIZE, IN_FEATURES]
    dtype: inherit

inits:
  - dim: IN_FEATURES
  - dim: OUT_FEATURES
  - dim: BIAS_SHAPE

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_FEATURES: 32
      OUT_FEATURES: 32
      BIAS_SHAPE: [32] # TODO: bind these to other dims
