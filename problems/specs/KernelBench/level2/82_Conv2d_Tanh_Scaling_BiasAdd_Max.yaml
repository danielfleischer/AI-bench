inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: SCALING_FACTOR
  - dim: BIAS_SHAPE
  - dim: POOL_KERNEL_SIZE

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 16
      HEIGHT: 32
      WIDTH: 32
      KERNEL_SIZE: 3
      SCALING_FACTOR: 2.0
      BIAS_SHAPE: [16, 1, 1] # TODO: bind these to other dims
      POOL_KERNEL_SIZE: 4
