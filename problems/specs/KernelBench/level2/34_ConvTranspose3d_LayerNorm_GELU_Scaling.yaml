inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, D, H, W]
    dtype: float16

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: PADDING
  - dim: BIAS
  - dim: EPS
  - dim: SCALING_FACTOR

ci:
  - params: [X]
    dtype: float16
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 8
      OUT_CHANNELS: 16
      D: 4
      H: 8
      W: 8
      KERNEL_SIZE: 4
      STRIDE: 2
      PADDING: 1
      BIAS: true
      EPS: 0.00001
      SCALING_FACTOR: 1.0
