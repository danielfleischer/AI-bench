inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: DIVISOR
  - dim: POOL_SIZE
  - dim: BIAS_SHAPE
  - dim: SUM_DIM

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 4
      OUT_CHANNELS: 8
      DEPTH: 8
      HEIGHT: 32
      WIDTH: 32
      KERNEL_SIZE: [3, 3, 3]
      DIVISOR: 2.0
      POOL_SIZE: [2, 2, 2]
      BIAS_SHAPE: [8, 1, 1, 1] # TODO: bind these to other dims
      SUM_DIM: 1
