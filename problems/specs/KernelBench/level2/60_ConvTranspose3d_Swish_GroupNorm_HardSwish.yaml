inputs:
  X:
    shape: [BATCH_SIZE, IN_CHANNELS, DEPTH, HEIGHT, WIDTH]
    dtype: inherit

inits:
  - dim: IN_CHANNELS
  - dim: OUT_CHANNELS
  - dim: KERNEL_SIZE
  - dim: STRIDE
  - dim: PADDING
  - dim: GROUPS
  - dim: EPS

ci:
  - params: [X]
    dtype: float32
    dims:
      BATCH_SIZE: 2
      IN_CHANNELS: 3
      OUT_CHANNELS: 8
      DEPTH: 8
      HEIGHT: 16
      WIDTH: 16
      KERNEL_SIZE: 3
      STRIDE: 2
      PADDING: 1
      GROUPS: 4
      EPS: 0.00001
